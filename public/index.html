<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevOps Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f12;
      --surface: #161a20;
      --border: #252b34;
      --accent: #00e5a0;
      --accent-dim: rgba(0, 229, 160, 0.12);
      --red: #ff4d6d;
      --text: #e8edf3;
      --muted: #5a6475;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 640px;
      margin-bottom: 40px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(0,229,160,0.3);
      border-radius: 4px;
      padding: 4px 10px;
      margin-bottom: 16px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .badge::before { content: '●'; font-size: 8px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    h1 {
      font-family: var(--mono);
      font-size: clamp(22px, 5vw, 32px);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    h1 span { color: var(--accent); }
    .subtitle {
      font-size: 14px;
      color: var(--muted);
      font-weight: 300;
    }

    /* ── Pipeline strip ── */
    .pipeline {
      display: flex;
      align-items: center;
      gap: 0;
      margin-top: 24px;
      font-family: var(--mono);
      font-size: 11px;
    }
    .pipe-step {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 6px 12px;
    }
    .pipe-step:first-child { border-radius: 6px 0 0 6px; }
    .pipe-step:last-child  { border-radius: 0 6px 6px 0; }
    .pipe-step.active { border-color: var(--accent); color: var(--accent); }
    .pipe-arrow { color: var(--muted); padding: 0 2px; background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

    /* ── Input area ── */
    .input-row {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 640px;
      margin-bottom: 24px;
    }
    input[type="text"] {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }
    button.add-btn {
      background: var(--accent);
      color: #0d0f12;
      border: none;
      border-radius: 8px;
      padding: 14px 24px;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    button.add-btn:hover { opacity: 0.85; }
    button.add-btn:active { transform: scale(0.97); }

    /* ── Task list ── */
    .stats {
      width: 100%;
      max-width: 640px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .stats-label { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .stats-count { font-family: var(--mono); font-size: 11px; color: var(--accent); }

    #task-list {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }

    .task-item:hover { border-color: #353d4a; background: #1c2129; }
    .task-item.done { opacity: 0.5; }
    .task-item.done .task-title { text-decoration: line-through; color: var(--muted); }

    .checkbox {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-radius: 5px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      font-size: 12px;
    }
    .task-item.done .checkbox { background: var(--accent); border-color: var(--accent); color: #0d0f12; }

    .task-title { flex: 1; font-size: 15px; font-weight: 400; }

    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      padding: 0 4px;
      line-height: 1;
      border-radius: 4px;
      transition: color 0.2s;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s;
    }
    .task-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: var(--red); }

    .empty {
      text-align: center;
      padding: 48px 0;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
    }

    /* ── Footer ── */
    footer {
      margin-top: 60px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <header>
    <div class="badge">CI/CD Live</div>
    <h1>Task<span>Manager</span></h1>
    <p class="subtitle">Deployed automatically via GitHub Actions → Render</p>
    <div class="pipeline">
      <div class="pipe-step active">📝 Commit</div>
      <div class="pipe-arrow">→</div>
      <div class="pipe-step active">🧪 Test</div>
      <div class="pipe-arrow">→</div>
      <div class="pipe-step active">🚀 Deploy</div>
      <div class="pipe-arrow">→</div>
      <div class="pipe-step active">✅ Live</div>
    </div>
  </header>

  <div class="input-row">
    <input type="text" id="new-task" placeholder="Add a new task…" />
    <button class="add-btn" onclick="addTask()">+ ADD</button>
  </div>

  <div class="stats">
    <span class="stats-label">Tasks</span>
    <span class="stats-count" id="stats">0 / 0 done</span>
  </div>

  <div id="task-list"></div>

  <footer>DEVOPS-TASK-MANAGER · v1.0.0 · MIT LICENSE</footer>

  <script>
    const list = document.getElementById('task-list');
    const statsEl = document.getElementById('stats');
    const input = document.getElementById('new-task');

    async function fetchTasks() {
      const res = await fetch('/api/tasks');
      const data = await res.json();
      render(data.tasks);
    }

    function render(tasks) {
      const done = tasks.filter(t => t.done).length;
      statsEl.textContent = `${done} / ${tasks.length} done`;

      if (tasks.length === 0) {
        list.innerHTML = '<div class="empty">// no tasks yet — add one above</div>';
        return;
      }

      list.innerHTML = tasks.map(t => `
        <div class="task-item ${t.done ? 'done' : ''}" onclick="toggle(${t.id})">
          <div class="checkbox">${t.done ? '✓' : ''}</div>
          <div class="task-title">${escHtml(t.title)}</div>
          <button class="delete-btn" onclick="event.stopPropagation(); del(${t.id})">×</button>
        </div>
      `).join('');
    }

    async function addTask() {
      const title = input.value.trim();
      if (!title) return;
      await fetch('/api/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      input.value = '';
      fetchTasks();
    }

    async function toggle(id) {
      await fetch(`/api/tasks/${id}`, { method: 'PATCH' });
      fetchTasks();
    }

    async function del(id) {
      await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
      fetchTasks();
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
    fetchTasks();
  </script>
</body>
</html>
